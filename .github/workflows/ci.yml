name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 执行测试
        shell: pwsh
        run: .\gradlew.bat test --stacktrace

      - name: 构建插件包
        shell: pwsh
        run: .\gradlew.bat buildPlugin --stacktrace

      - name: 验证插件兼容性
        shell: pwsh
        # GitHub Actions 线上允许下载 verifier 所需 IDE；本地默认不会下载，除非显式指定 localVerificationIdePath。
        run: .\gradlew.bat verifyPlugin --stacktrace

      - name: 上传插件构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-branch-plugin-distributions
          path: build/distributions/*.zip
          if-no-files-found: warn
