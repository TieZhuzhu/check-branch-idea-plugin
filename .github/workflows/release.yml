name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 执行测试
        shell: pwsh
        run: .\gradlew.bat clean test --stacktrace

      - name: 构建插件包
        shell: pwsh
        run: .\gradlew.bat buildPlugin --stacktrace

      - name: 验证插件兼容性
        shell: pwsh
        # GitHub Actions 线上允许下载 verifier 所需 IDE；本地默认不会下载，除非显式指定 localVerificationIdePath。
        run: .\gradlew.bat verifyPlugin --stacktrace

      - name: 整理发布产物
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/release-assets | Out-Null
          Copy-Item -Path build/distributions/*.zip -Destination build/release-assets
          Get-ChildItem -Path build/libs -Filter *.jar |
            Where-Object { $_.Name -notmatch '-(base|instrumented)\.jar$' } |
            Copy-Item -Destination build/release-assets

      - name: 上传插件构建产物
        uses: actions/upload-artifact@v4
        with:
          name: check-branch-plugin-release
          path: build/release-assets/*
          if-no-files-found: error

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/release-assets/*
          generate_release_notes: true
